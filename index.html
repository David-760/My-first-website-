<h3>Welcome to My First Web App 🚀</h3>
        <h1>future developer</h1>

        <p>I am learning coding and becoming a developer 🚀</p>

        <img src="https://picsum.photos/150" alt="My Image">

        <h2 id="message">Click the button to get motivation 💡</h2>
        <input type="text" id="username" placeholder="Enter your name">
<br><br>
        <button onclick="greetUser()">Greet Me</button>

        <button onclick="showMessage()">Motivate Me</button>

        <button onclick="changeColor()">Change Theme</button>
<a href="about.html">Go to About Page</a>

    <script>
        function showMessage() {
            let messages = [
                "You will succeed 🔥",
                "Keep pushing forward 💪",
                "Your future is bright ✨"
            ];

            let random = Math.floor(Math.random() * messages.length);

            document.getElementById("message").innerText = messages[random];
        }

        function changeColor() {
            let colors = ["blue", "black", "purple", "green", "red", "orange"];

            let random = Math.floor(Math.random() * colors.length);

            document.body.style.backgroundColor = colors[random];length
        }
  
          
    
    function greetUser() {
    let name = document.getElementById("username").value;

    if (name === "") {
        alert("Please enter your name!");
    } else {
        document.getElementById("message").innerText =
            "Welcome " + name + "! Your future is bright 🚀";
    }
}

            
    </script>
