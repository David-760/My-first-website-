<!DOCTYPE html>
<html>
<head>
    <title>My First Page</title>

<style>
body {
    background-color: blue;
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
}

h1 {
    color: gold;
}

h2 {
    margin-top: 20px;
}

h3 {
    color: white;
    margin-bottom: 10px;
}

button {
    padding: 12px 25px;
    margin: 10px;
    font-size: 16px;
    background-color: gold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

img {
    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
    margin: 15px 0;
}

input {
    padding: 10px;
    width: 200px;
    border-radius: 5px;
    border: none;
    margin-top: 10px;
}

a {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background-color: white;
    color: blue;
    text-decoration: none;
    border-radius: 5px;
}

a:hover {
    background-color: lightgray;
}
</style>

</head>

<body>

  
<h3>Welcome to My First Web App 🚀</h3>
        <h1>future developer</h1>

        <p>I am learning coding and becoming a developer 🚀</p>

        <img src="https://picsum.photos/150" alt="My Image">

        <h2 id="message">Click the button to get motivation 💡</h2>
        <input type="text" id="username" placeholder="Enter your name">
<br><br>
        <button onclick="greetUser()">Greet Me</button>

        <button onclick="showMessage()">Motivate Me</button>

        <button onclick="changeColor()">Change Theme</button>
<a href="about.html">Go to About Page</a>
    </div>

    <script>
        function showMessage() {
            let messages = [
                "You will succeed 🔥",
                "Keep pushing forward 💪",
                "Your future is bright ✨"
            ];

            let random = Math.floor(Math.random() * messages.length);

            document.getElementById("message").innerText = messages[random];
        }

        function changeColor() {
            let colors = ["blue", "black", "purple", "green", "red", "orange"];

            let random = Math.floor(Math.random() * colors.length);

            document.body.style.backgroundColor = colors[random];
        }
  
          
    
    function greetUser() {
    let name = document.getElementById("username").value;

    if (name === "") {
        alert("Please enter your name!");
    } else {
        document.getElementById("message").innerText =
            "Welcome " + name + "! Your future is bright 🚀";
    }
}

            
    </script>

</body>
</html>
